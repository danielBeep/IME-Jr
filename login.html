<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./login_style.css">
</head>
<body>
    <div class="title"><h1>Área de login</h1></div> <!--Título da página-->

    <section class="form_section"> <!--Seção do formulário-->
        <form>
            <!--Informações básicas (NOME, EMAIL E SENHA)-->
            <h3 style="font-family: Arial, Helvetica, sans-serif;">Preencha as informações básicas</h3>

            <div class="name">
                <label for="name">Nome de usuário:</label>
                <input required type="text" placeholder="Nome de usuário" id="name">
            </div>

            <div class="email">
                <label for="email">Email:</label>
                <input required type="email" placeholder="Email" id="email">
            </div>

            <div class="password">
                <label for="password">Senha:</label>
                <input required type="password" placeholder="Senha (max 8 digitos)" id="password" maxlength="8">
            </div>

            <!--CheckBox-->
            <h3 style="font-family: Arial, Helvetica, sans-serif;">Qual dessas redes sociais você utiliza para seguir a gente?</h3>
            <div class="box">
                <input type="checkbox" id="youtube" class="youtube" value="youtube">
                <label for="youtube">Youtube</label><br>
             
                <input type="checkbox" id="instagram" class="instagram" value="instagram">
                <label for="instagram">Instagram</label><br>
              
                <input type="checkbox" id="x" class="x" value="x">
                <label for="x">X (Twitter)</label>
            </div>

            <h3 style="font-family: Arial, Helvetica, sans-serif;">Você gostaria de receber notificações de novidades?</h3>
            <div class="box">
                <input type="radio" id="yes" name="notification" value="yes">
                <label for="yes">Sim, eu gostaria.</label><br>
             
                <input type="radio" id="no" name="notification" value="no">
                <label for="no">Não, eu não gostaria.</label><br>
              
                <input type="radio" id="off" name="notification" value="off">
                <label for="off">Gostaria de saber apenas as promoções.</label>
            </div>

            <!--Botão enviar-->
            <div class="send"><input type="submit" value="Enviar"></div> 
        </form>
    </section>

    <section class="menu"> <!--Seção do menu de opções-->
        <ul>
            <li><a href="./Index.html">Página principal</a></li>
            <li><a href="./galeria.html">Galeria de fotos</a></li>
            <li><a href="https://instagram.com/corbetta_facas" target="_blank">Instagram do vendedor</a></li>
        </ul>
    </section>
</body>
</html>
